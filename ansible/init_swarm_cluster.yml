- name: Initialize Docker Swarm
  hosts: managers
  gather_facts: false
  become: false
  tasks:
    - name: Initialize swarm on first manager
      raw: docker swarm init
      run_once: true
      register: command_result
      failed_when: "'This node is already part of a swarm' not in command_result.stderr and command_result.rc != 0"

    - name: Retrieve worker join token
      raw: docker swarm join-token worker -q
      register: worker_token
      run_once: true

    - name: Check worker join token
      debug:
        msg: "docker swarm join --token {{ worker_token.stdout | trim }} {{ groups['managers'][0] }}:2377"

- name: Join workers to the Swarm cluster
  hosts: workers
  gather_facts: false
  become: false
  tasks:
    - name: Join swarm as worker
      raw: "docker swarm join --token {{ hostvars[groups['managers'][0]]['worker_token'].stdout | trim }} {{ groups['managers'][0] }}:2377"
      register: command_result
      failed_when: "'This node is already part of a swarm' not in command_result.stderr and command_result.rc != 0"
